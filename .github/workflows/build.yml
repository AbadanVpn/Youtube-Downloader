name: Build and Package Windows EXE

on:
  push:
    tags:
      - 'v*' # هر زمان تگی مثل v1.0.0 بزنی، این اسکریپت فعال میشه

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6 yt-dlp

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile main.py

    # 🛠️ راه‌حل قطعی: استفاده از اکشن رسمی و پرسرعت برای راه‌اندازی ffmpeg
    - name: Setup FFmpeg
      uses: FedericoCarboni/setup-ffmpeg@v3
      id: setup-ffmpeg

    - name: Create Clean Zip Package
      run: |
        # ساخت یک پوشه شکیل برای کاربر
        New-Item -ItemType Directory -Force -Path YouTube-Downloader
        
        # انتقال فایل اجرایی اصلی به پوشه خروجی
        Move-Item -Path dist\main.exe -Destination YouTube-Downloader\
        
        # پیدا کردن مسیر دقیق ffmpeg.exe نصب شده توسط اکشن و کپی کردن آن به پوشه خروجی
        $ffmpegPath = (Get-Command ffmpeg).Source
        Copy-Item -Path $ffmpegPath -Destination YouTube-Downloader\
        
        # فشرده‌سازی نهایی
        Compress-Archive -Path YouTube-Downloader -DestinationPath YouTube-Downloader-Windows.zip

    - name: Release and Upload to GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: YouTube-Downloader-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
