name: Build and Package Windows EXE

on:
  push:
    tags:
      - 'v*' # با زدن تگی مثل v1.0.4 این فرآیند شروع می‌شود

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 🟢 این بخش اصلاح شد تا گیت‌هاب ارور سینتکس ندهد
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6 yt-dlp

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile main.py

    - name: Download and Extract FFmpeg (Guaranteed Link)
      run: |
        # 🟢 استفاده از لینک فوق‌العاده سبک‌تر و تضمینی Essentials
        $url = "https://github.com/GyanD/codexffmpeg/releases/download/2026-06-21-git-d007a34651/ffmpeg-2026-06-21-git-d007a34651-essentials_build.zip"
        Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"

    - name: Create Clean Zip Package
      run: |
        # ساخت پوشه نهایی برای کاربر
        New-Item -ItemType Directory -Force -Path YouTube-Downloader
        
        # انتقال فایل اصلی برنامه
        Move-Item -Path dist\main.exe -Destination YouTube-Downloader\
        
        # پیدا کردن هوشمند ffmpeg.exe استخراج شده و کپی آن به پوشه اصلی
        Get-ChildItem -Path "ffmpeg_extracted" -Filter "ffmpeg.exe" -Recurse | Copy-Item -Destination YouTube-Downloader\
        
        # فشرده‌سازی نهایی پوشه برای دانلود راحت کاربر
        Compress-Archive -Path YouTube-Downloader -DestinationPath YouTube-Downloader-Windows.zip

    - name: Release and Upload to GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: YouTube-Downloader-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
