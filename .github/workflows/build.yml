name: Build and Package Windows EXE

on:
  push:
    tags:
      - 'v*' # با زدن تگ جدید (مثلاً v1.5.0) فرآیند کامپایل شروع می‌شود

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # دسترسی لازم برای آپلود فایل در بخش ریلیز

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6 yt-dlp

    - name: Build EXE with PyInstaller (Inject Icon and Font)
      run: |
        # 🟢 تزریق همزمان آیکون اختصاصی و فونت ایران‌سنس به داخل یک فایل واحد EXE
        pyinstaller --noconsole --onefile --icon=app_icon.ico --add-data "IRANSansMobile.ttf;." main.py

    - name: Download and Extract FFmpeg (Guaranteed BtbN Link)
      run: |
        $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
        Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"

    - name: Create Clean Zip Package
      run: |
        # ساخت پوشه نهایی ارسالی به کاربر
        New-Item -ItemType Directory -Force -Path YouTube-Downloader
        
        # انتقال فایل اصلی برنامه کامپایل شده به پوشه خروجی
        Move-Item -Path dist\main.exe -Destination YouTube-Downloader\
        
        # پیدا کردن هوشمند ffmpeg.exe استخراج شده و کپی آن به کنار فایل اصلی
        Get-ChildItem -Path "ffmpeg_extracted" -Filter "ffmpeg.exe" -Recurse | Copy-Item -Destination YouTube-Downloader\
        
        # فشرده‌سازی نهایی پوشه به فرمت Zip
        Compress-Archive -Path YouTube-Downloader -DestinationPath YouTube-Downloader-Windows.zip

    - name: Release and Upload to GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: YouTube-Downloader-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
